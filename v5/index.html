<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#07090d">
<title>ATLAS X V5.1｜专业模拟交易终端</title>
<style>
:root{color-scheme:dark}*{box-sizing:border-box}html,body{margin:0;min-height:100%;background:#07090d;color:#f3f6fa;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif}.boot{position:fixed;inset:0;display:grid;place-items:center;background:radial-gradient(circle at 50% 28%,#16223d 0,transparent 38%),#07090d}.box{text-align:center;width:min(86vw,360px)}.mark{width:52px;height:52px;margin:auto;border-radius:15px;background:linear-gradient(145deg,#6d8cff,#62e0c1);box-shadow:0 0 42px rgba(109,140,255,.28);animation:p 1s infinite alternate}.bar{height:4px;margin:22px 0 14px;border-radius:99px;background:#171e29;overflow:hidden}.bar i{display:block;width:36%;height:100%;border-radius:99px;background:linear-gradient(90deg,#6d8cff,#62e0c1);animation:l 1.1s infinite}.title{font-size:14px;font-weight:750;letter-spacing:.04em}.sub{margin-top:8px;color:#7e8999;font-size:11px;line-height:1.7}.error{display:none;color:#ff7587;font-size:12px;line-height:1.7;margin-top:15px}@keyframes p{to{transform:scale(.84);filter:brightness(1.2)}}@keyframes l{from{transform:translateX(-130%)}to{transform:translateX(390%)}}
</style>
</head>
<body>
<div class="boot"><div class="box"><div class="mark"></div><div class="bar"><i></i></div><div class="title">正在启动 ATLAS X V5.1</div><div class="sub" id="status">加载专业交易终端、实时行情与模拟账户引擎…</div><div class="error" id="error"></div></div></div>
<script>
(async()=>{
  const status=document.getElementById('status');
  const error=document.getElementById('error');
  try{
    const files=Array.from({length:15},(_,i)=>`p${String(i+1).padStart(2,'0')}.b64`);
    let done=0;
    const parts=await Promise.all(files.map(async(name)=>{
      const r=await fetch(`./${name}?v=51`,{cache:'no-store'});
      if(!r.ok) throw new Error(`${name} HTTP ${r.status}`);
      const text=(await r.text()).trim();
      done++;
      status.textContent=`正在装载核心模块 ${done} / ${files.length}…`;
      return text;
    }));
    const encoded=parts.join('').replace(/\s+/g,'');
    const binary=atob(encoded);
    const bytes=new Uint8Array(binary.length);
    for(let i=0;i<binary.length;i++) bytes[i]=binary.charCodeAt(i);
    const html=new TextDecoder('utf-8').decode(bytes);
    if(!html.startsWith('<!doctype html>')&&!html.startsWith('<!DOCTYPE html>')) throw new Error('源码校验失败');
    document.open();document.write(html);document.close();
  }catch(e){
    console.error(e);
    status.textContent='终端启动失败';
    error.style.display='block';
    error.textContent=`部分资源没有成功加载：${e.message}。请关闭旧页面后重新打开，或使用 Safari / Chrome。`;
  }
})();
</script>
</body>
</html>
