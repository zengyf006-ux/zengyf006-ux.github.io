name: ATLAS X Unified Verify

on:
  push:
    branches:
      - atlas-x-unified-pro
    paths:
      - 'atlas-x-unified/**'
      - '.github/workflows/atlas-x-unified-verify.yml'
  pull_request:
    paths:
      - 'atlas-x-unified/**'
      - '.github/workflows/atlas-x-unified-verify.yml'

permissions:
  contents: read

concurrency:
  group: atlas-x-unified-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: atlas-x-unified
        shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: atlas-x-unified/package-lock.json
      - name: Prepare diagnostic logs
        run: mkdir -p ci-logs
      - name: Install locked dependencies
        run: set -o pipefail; npm ci 2>&1 | tee ci-logs/npm-ci.log
      - name: Rebuild deterministic foundation artifacts
        run: |
          set -o pipefail
          {
            node scripts/apply-foundation-rework.mjs
            npm run generate:contracts
          } 2>&1 | tee ci-logs/generated.log
      - name: Reject generated drift
        working-directory: ${{ github.workspace }}
        run: git diff --exit-code -- atlas-x-unified/openapi atlas-x-unified/src/generated atlas-x-unified/vectors atlas-x-unified/test/contracts.test.ts atlas-x-unified/test/golden-vectors.test.ts atlas-x-unified/package-lock.json
      - name: Strict TypeScript
        run: set -o pipefail; npm run typecheck 2>&1 | tee ci-logs/typecheck.log
      - name: Unit contract and vector tests
        run: set -o pipefail; npm test 2>&1 | tee ci-logs/tests.log
      - name: Production Web build
        run: set -o pipefail; npm run build:web 2>&1 | tee ci-logs/build.log
      - name: Verify production PWA shell
        run: set -o pipefail; npm run verify:pwa 2>&1 | tee ci-logs/pwa.log
      - name: Dependency audit
        run: set -o pipefail; npm run audit 2>&1 | tee ci-logs/audit.log
      - name: Upload CI diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: atlas-x-unified-ci-logs-${{ github.sha }}
          path: atlas-x-unified/ci-logs
          if-no-files-found: error
          retention-days: 14
      - name: Upload production Web build
        uses: actions/upload-artifact@v4
        with:
          name: atlas-x-unified-web-${{ github.sha }}
          path: atlas-x-unified/apps/web/dist
          if-no-files-found: error
          retention-days: 14

  public-market-smoke:
    needs: verify
    runs-on: ubuntu-latest
    timeout-minutes: 3
    defaults:
      run:
        working-directory: atlas-x-unified
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Verify Coinbase public market chain
        run: npm run smoke:public
