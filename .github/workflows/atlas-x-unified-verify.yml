name: ATLAS X Unified Verify

on:
  push:
    branches:
      - atlas-x-unified-pro
    paths:
      - 'atlas-x-unified/**'
      - '.github/workflows/atlas-x-unified-verify.yml'
  pull_request:
    paths:
      - 'atlas-x-unified/**'
      - '.github/workflows/atlas-x-unified-verify.yml'

permissions:
  contents: write

concurrency:
  group: atlas-x-unified-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: atlas-x-unified
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'push' && github.ref_name || github.event.pull_request.head.sha }}
      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: atlas-x-unified/package-lock.json
      - name: Refresh workspace lock metadata
        run: npm install --package-lock-only --ignore-scripts
      - name: Install locked dependencies
        run: npm ci
      - name: Rebuild deterministic foundation artifacts
        run: |
          node scripts/apply-foundation-rework.mjs
          npm run generate:contracts
      - name: Reject generated drift
        working-directory: .
        run: git diff --exit-code -- atlas-x-unified/openapi atlas-x-unified/src/generated atlas-x-unified/vectors atlas-x-unified/test/contracts.test.ts atlas-x-unified/test/golden-vectors.test.ts
      - name: Verify unified workspaces
        run: npm run verify
      - name: Commit refreshed workspace lock
        if: github.event_name == 'push'
        working-directory: .
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add atlas-x-unified/package-lock.json
          if git diff --cached --quiet; then
            echo "No lock changes"
          else
            git commit -m "chore: register unified workspaces"
            git push origin HEAD:atlas-x-unified-pro
          fi
