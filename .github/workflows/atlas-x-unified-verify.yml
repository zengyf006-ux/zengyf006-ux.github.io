name: ATLAS X Unified Verify

on:
  push:
    paths:
      - 'atlas-x-unified/**'
  pull_request:
    paths:
      - 'atlas-x-unified/**'

permissions:
  contents: write

concurrency:
  group: atlas-x-unified-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: atlas-x-unified
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: atlas-x-unified/package-lock.json
      - name: Refresh lock for dependency metadata
        if: github.event_name == 'push'
        shell: bash
        run: |
          npm install --package-lock-only --ignore-scripts
          if ! git diff --quiet -- package-lock.json; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add package-lock.json
            git commit -m "chore: refresh unified dependency lock"
            git push origin "HEAD:${GITHUB_REF_NAME}"
          fi
      - name: Install locked dependencies
        run: npm ci
      - name: Verify unified core
        run: npm run verify
