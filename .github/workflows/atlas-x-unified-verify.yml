name: ATLAS X Unified Materialize Web

on:
  push:
    branches:
      - atlas-x-unified-pro
    paths:
      - 'atlas-x-unified/**'
      - '.github/workflows/atlas-x-unified-verify.yml'
  pull_request:
    paths:
      - 'atlas-x-unified/**'
      - '.github/workflows/atlas-x-unified-verify.yml'

permissions:
  contents: write

concurrency:
  group: atlas-x-unified-materialize-${{ github.ref }}
  cancel-in-progress: false

jobs:
  materialize:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: atlas-x-unified
    steps:
      - name: Checkout current development branch
        uses: actions/checkout@v4
        with:
          ref: atlas-x-unified-pro
          fetch-depth: 2
      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: atlas-x-unified/package-lock.json
      - name: Refresh workspace lock
        run: npm install --package-lock-only --ignore-scripts
      - name: Install locked dependencies
        run: npm ci
      - name: Rebuild deterministic contracts
        run: |
          node scripts/apply-foundation-rework.mjs
          npm run generate:contracts
      - name: Verify Web product batch
        run: npm run verify
      - name: Restore read-only verification and commit lock
        working-directory: ${{ github.workspace }}
        run: |
          git show HEAD^:.github/workflows/atlas-x-unified-verify.yml > .github/workflows/atlas-x-unified-verify.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add atlas-x-unified/package-lock.json .github/workflows/atlas-x-unified-verify.yml
          git diff --cached --quiet || git commit -m "chore: lock verified Web dependencies"
          git push origin HEAD:atlas-x-unified-pro
