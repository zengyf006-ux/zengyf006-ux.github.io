name: ATLAS X Unified Verify

on:
  push:
    paths:
      - 'atlas-x-unified/**'
  pull_request:
    paths:
      - 'atlas-x-unified/**'

permissions:
  contents: read

concurrency:
  group: atlas-x-unified-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: atlas-x-unified
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: atlas-x-unified/package-lock.json
      - name: Install locked dependencies
        run: npm ci
      - name: Verify unified core
        run: npm run verify
