name: ATLAS X Unified Verify

on:
  push:
    branches:
      - atlas-x-unified-pro
    paths:
      - 'atlas-x-unified/**'
      - '.github/workflows/atlas-x-unified-verify.yml'
      - '.codex/goal-loop/atlas-x-unified-pro/EVIDENCE/g4-materialize.tar.gz'
  pull_request:
    paths:
      - 'atlas-x-unified/**'
      - '.github/workflows/atlas-x-unified-verify.yml'
      - '.codex/goal-loop/atlas-x-unified-pro/EVIDENCE/g4-materialize.tar.gz'

permissions:
  contents: write

concurrency:
  group: atlas-x-unified-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: atlas-x-unified
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Materialize verified G4 ledger batch
        working-directory: .
        run: tar -xzf .codex/goal-loop/atlas-x-unified-pro/EVIDENCE/g4-materialize.tar.gz -C atlas-x-unified
      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: atlas-x-unified/package-lock.json
      - name: Install locked dependencies
        run: npm ci
      - name: Rebuild deterministic foundation artifacts
        run: |
          node scripts/apply-foundation-rework.mjs
          npm run generate:contracts
      - name: Reject generated drift
        working-directory: .
        run: git diff --exit-code -- atlas-x-unified/openapi atlas-x-unified/src/generated atlas-x-unified/vectors atlas-x-unified/test/contracts.test.ts atlas-x-unified/test/golden-vectors.test.ts atlas-x-unified/package-lock.json
      - name: Verify deterministic unified workspaces
        run: npm run verify
      - name: Commit verified G4 ledger batch
        if: github.event_name == 'push' && github.ref == 'refs/heads/atlas-x-unified-pro'
        working-directory: .
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add atlas-x-unified
          if ! git diff --cached --quiet; then
            git commit -m 'feat: add event-sourced paper trading ledger'
            git push origin HEAD:atlas-x-unified-pro
          fi

  public-market-smoke:
    needs: verify
    runs-on: ubuntu-latest
    timeout-minutes: 3
    defaults:
      run:
        working-directory: atlas-x-unified
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Verify Coinbase public market chain
        run: npm run smoke:public
