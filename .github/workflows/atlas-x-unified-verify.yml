name: ATLAS X Unified Verify

on:
  push:
    branches:
      - atlas-x-unified-pro
    paths:
      - 'atlas-x-unified/**'
      - '.github/workflows/atlas-x-unified-verify.yml'
      - '.codex/goal-loop/atlas-x-unified-pro/**'
  pull_request:
    paths:
      - 'atlas-x-unified/**'
      - '.github/workflows/atlas-x-unified-verify.yml'
      - '.codex/goal-loop/atlas-x-unified-pro/**'

permissions:
  contents: read

concurrency:
  group: atlas-x-unified-${{ github.ref }}
  cancel-in-progress: true

env:
  ATLAS_EXACT_HEAD: ${{ github.event.pull_request.head.sha || github.sha }}

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: atlas-x-unified
        shell: bash
    steps:
      - name: Checkout exact PR Head
        uses: actions/checkout@v4
        with:
          ref: ${{ env.ATLAS_EXACT_HEAD }}
          fetch-depth: 0
      - name: Confirm exact Head checkout
        run: test "$(git rev-parse HEAD)" = "$ATLAS_EXACT_HEAD"
      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: atlas-x-unified/package-lock.json
      - name: Prepare diagnostic logs
        run: mkdir -p ci-logs
      - name: Install locked dependencies
        run: set -o pipefail; npm ci 2>&1 | tee ci-logs/npm-ci.log
      - name: Rebuild deterministic foundation artifacts
        run: |
          set -o pipefail
          {
            node scripts/apply-foundation-rework.mjs
            npm run generate:contracts
          } 2>&1 | tee ci-logs/generated.log
      - name: Reject generated drift
        working-directory: ${{ github.workspace }}
        run: git diff --exit-code -- atlas-x-unified/openapi atlas-x-unified/src/generated atlas-x-unified/vectors atlas-x-unified/test/contracts.test.ts atlas-x-unified/test/golden-vectors.test.ts atlas-x-unified/package-lock.json
      - name: Strict TypeScript
        run: set -o pipefail; npm run typecheck 2>&1 | tee ci-logs/typecheck.log
      - name: Unit contract and vector tests
        run: set -o pipefail; npm test 2>&1 | tee ci-logs/tests.log
      - name: Production Web build
        run: set -o pipefail; npm run build:web 2>&1 | tee ci-logs/build.log
      - name: Verify production PWA shell
        run: set -o pipefail; npm run verify:pwa 2>&1 | tee ci-logs/pwa.log
      - name: Dependency audit
        run: set -o pipefail; npm run audit 2>&1 | tee ci-logs/audit.log
      - name: Upload CI diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: atlas-x-unified-ci-logs-${{ env.ATLAS_EXACT_HEAD }}
          path: atlas-x-unified/ci-logs
          if-no-files-found: error
          retention-days: 14
      - name: Upload production Web build
        uses: actions/upload-artifact@v4
        with:
          name: atlas-x-unified-web-${{ env.ATLAS_EXACT_HEAD }}
          path: atlas-x-unified/apps/web/dist
          if-no-files-found: error
          retention-days: 14

  web-quality:
    needs: verify
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: atlas-x-unified
        shell: bash
    steps:
      - name: Checkout exact PR Head
        uses: actions/checkout@v4
        with:
          ref: ${{ env.ATLAS_EXACT_HEAD }}
          fetch-depth: 0
      - name: Confirm exact Head checkout
        run: test "$(git rev-parse HEAD)" = "$ATLAS_EXACT_HEAD"
      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: atlas-x-unified/package-lock.json
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: atlas-x-unified/requirements-e2e.txt
      - name: Install readable CJK screenshot fonts
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends fonts-noto-cjk
          fc-cache -f
      - name: Install locked application dependencies
        run: npm ci
      - name: Install pinned browser-quality dependencies
        run: python -m pip install --disable-pip-version-check -r requirements-e2e.txt
      - name: Build production Web application
        run: npm run build:web
      - name: Start production preview
        run: |
          mkdir -p ci-logs ci-evidence/g7
          npm run preview --workspace @atlas-x/web -- --host 127.0.0.1 --port 4173 > ci-logs/preview.log 2>&1 &
          echo $! > ci-logs/preview.pid
          for attempt in {1..30}; do
            if curl --fail --silent http://127.0.0.1:4173/ >/dev/null; then
              exit 0
            fi
            sleep 1
          done
          cat ci-logs/preview.log
          exit 1
      - name: Browser quality gates
        env:
          ATLAS_HEAD_SHA: ${{ env.ATLAS_EXACT_HEAD }}
          PYTHONUNBUFFERED: '1'
        run: timeout --signal=TERM --kill-after=10s 120s python scripts/web-quality-safe.py --base-url http://127.0.0.1:4173/ --output ci-evidence/g7
      - name: Upload browser quality evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: atlas-x-unified-web-quality-${{ env.ATLAS_EXACT_HEAD }}
          path: |
            atlas-x-unified/ci-evidence/g7
            atlas-x-unified/ci-logs/preview.log
          if-no-files-found: error
          retention-days: 14

  public-market-smoke:
    needs: verify
    runs-on: ubuntu-latest
    timeout-minutes: 3
    defaults:
      run:
        working-directory: atlas-x-unified
    steps:
      - name: Checkout exact PR Head
        uses: actions/checkout@v4
        with:
          ref: ${{ env.ATLAS_EXACT_HEAD }}
          fetch-depth: 0
      - name: Confirm exact Head checkout
        run: test "$(git rev-parse HEAD)" = "$ATLAS_EXACT_HEAD"
      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Verify Coinbase public market chain
        run: npm run smoke:public

  final-evidence:
    needs: [verify, web-quality, public-market-smoke]
    runs-on: ubuntu-latest
    timeout-minutes: 8
    defaults:
      run:
        working-directory: atlas-x-unified
        shell: bash
    steps:
      - name: Checkout exact PR Head
        uses: actions/checkout@v4
        with:
          ref: ${{ env.ATLAS_EXACT_HEAD }}
          fetch-depth: 0
      - name: Confirm exact Head checkout
        run: test "$(git rev-parse HEAD)" = "$ATLAS_EXACT_HEAD"
      - name: Download exact production build
        uses: actions/download-artifact@v4
        with:
          name: atlas-x-unified-web-${{ env.ATLAS_EXACT_HEAD }}
          path: atlas-x-unified/ci-input/web
      - name: Download exact browser evidence
        uses: actions/download-artifact@v4
        with:
          name: atlas-x-unified-web-quality-${{ env.ATLAS_EXACT_HEAD }}
          path: atlas-x-unified/ci-input/quality
      - name: Download exact CI diagnostics
        uses: actions/download-artifact@v4
        with:
          name: atlas-x-unified-ci-logs-${{ env.ATLAS_EXACT_HEAD }}
          path: atlas-x-unified/ci-input/logs
      - name: Resolve evidence identity
        run: |
          BASE_SHA='${{ github.event.pull_request.base.sha }}'
          if [ -z "$BASE_SHA" ]; then
            BASE_SHA="$(git rev-parse origin/main)"
          fi
          echo "ATLAS_BASE_SHA=$BASE_SHA" >> "$GITHUB_ENV"
      - name: Build independent review package
        env:
          ATLAS_HEAD_SHA: ${{ env.ATLAS_EXACT_HEAD }}
          ATLAS_RUN_ID: ${{ github.run_id }}
          ATLAS_REPOSITORY: ${{ github.repository }}
          ATLAS_PR_NUMBER: ${{ github.event.pull_request.number || '15' }}
          ATLAS_BRANCH: ${{ github.head_ref || github.ref_name }}
          ATLAS_BASE_BRANCH: ${{ github.base_ref || 'main' }}
          ATLAS_EVENT_NAME: ${{ github.event_name }}
        run: node scripts/build-final-evidence.mjs
      - name: Upload independent review package
        uses: actions/upload-artifact@v4
        with:
          name: atlas-x-unified-final-evidence-${{ env.ATLAS_EXACT_HEAD }}
          path: atlas-x-unified/ci-evidence/final
          if-no-files-found: error
          retention-days: 30
