name: ATLAS X Pro acceptance

on:
  pull_request:
    branches: ['atlas-x-rebuild-base']
    paths:
      - 'atlas-x-pro/**'
      - 'qa/atlas-x-pro/**'
      - '.github/workflows/atlas-x-pro-qa.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  acceptance:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Prepare browser and deterministic Chinese font
        run: |
          npm init -y
          npm install --no-save playwright-core@1.55.0 @fontsource-variable/noto-sans-sc
          test -x /usr/bin/google-chrome
          mkdir -p atlas-x-pro/vendor-font
          FONT_FILE=$(find node_modules/@fontsource-variable/noto-sans-sc/files -type f -name '*.woff2' | head -n 1)
          test -n "$FONT_FILE"
          cp "$FONT_FILE" atlas-x-pro/vendor-font/qa-font.woff2

      - name: Start static server
        run: |
          python3 -m http.server 4173 > /tmp/atlas-pro-http.log 2>&1 &
          echo $! > /tmp/atlas-pro-http.pid
          sleep 2

      - name: Capture and validate
        env:
          CHROME_BIN: /usr/bin/google-chrome
        run: node qa/atlas-x-pro/capture.mjs

      - name: Upload screenshots and report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: atlas-x-pro-acceptance
          path: |
            qa-artifacts-pro/screenshots
            qa-artifacts-pro/report.json
            /tmp/atlas-pro-http.log
          retention-days: 1
          if-no-files-found: error
