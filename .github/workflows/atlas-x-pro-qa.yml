name: ATLAS X Pro acceptance

on:
  pull_request:
    branches: ['atlas-x-rebuild-base']
    paths:
      - 'atlas-x-pro/**'
      - 'qa/atlas-x-pro/**'
      - '.github/workflows/atlas-x-pro-qa.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  acceptance:
    name: acceptance-${{ matrix.viewport }}
    runs-on: ubuntu-latest
    timeout-minutes: 11
    strategy:
      fail-fast: false
      matrix:
        viewport:
          - iphone-390x844
          - iphone-430x932
          - desktop-1440x900
          - desktop-1920x1080
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Prepare browser and deterministic Chinese font
        run: |
          npm init -y
          npm install --no-save playwright-core@1.55.0 @fontsource/noto-sans-sc
          test -x /usr/bin/google-chrome
          test -f node_modules/@fontsource/noto-sans-sc/400.css
          test -f node_modules/@fontsource/noto-sans-sc/700.css

      - name: Start static server
        run: |
          python3 -m http.server 4173 > /tmp/atlas-pro-http.log 2>&1 &
          echo $! > /tmp/atlas-pro-http.pid
          sleep 2

      - name: Capture and validate
        env:
          CHROME_BIN: /usr/bin/google-chrome
          ATLAS_VIEWPORT: ${{ matrix.viewport }}
        run: node qa/atlas-x-pro/capture.mjs

      - name: Verify professional workspace quality
        env:
          CHROME_BIN: /usr/bin/google-chrome
          ATLAS_VIEWPORT: ${{ matrix.viewport }}
        run: node qa/atlas-x-pro/quality-extra.mjs

      - name: Verify order execution protections
        env:
          CHROME_BIN: /usr/bin/google-chrome
          ATLAS_VIEWPORT: ${{ matrix.viewport }}
        run: node qa/atlas-x-pro/execution-guard.mjs

      - name: Verify ledger-derived analytics
        env:
          CHROME_BIN: /usr/bin/google-chrome
          ATLAS_VIEWPORT: ${{ matrix.viewport }}
        run: node qa/atlas-x-pro/performance-analytics.mjs

      - name: Verify portfolio risk center
        env:
          CHROME_BIN: /usr/bin/google-chrome
          ATLAS_VIEWPORT: ${{ matrix.viewport }}
        run: node qa/atlas-x-pro/portfolio-risk.mjs

      - name: Verify semantic Chinese typography
        env:
          CHROME_BIN: /usr/bin/google-chrome
          ATLAS_VIEWPORT: ${{ matrix.viewport }}
        run: node qa/atlas-x-pro/semantic-typography.mjs

      - name: Capture advanced visual states
        env:
          CHROME_BIN: /usr/bin/google-chrome
          ATLAS_VIEWPORT: ${{ matrix.viewport }}
        run: node qa/atlas-x-pro/advanced-visual.mjs

      - name: Guard mobile first-screen layouts
        if: startsWith(matrix.viewport, 'iphone-')
        env:
          CHROME_BIN: /usr/bin/google-chrome
          ATLAS_VIEWPORT: ${{ matrix.viewport }}
        run: node qa/atlas-x-pro/mobile-layout-guard.mjs

      - name: Verify mobile account tools
        if: startsWith(matrix.viewport, 'iphone-')
        env:
          CHROME_BIN: /usr/bin/google-chrome
          ATLAS_VIEWPORT: ${{ matrix.viewport }}
        run: node qa/atlas-x-pro/mobile-account-tools.mjs

      - name: Upload screenshots and report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: atlas-x-pro-${{ matrix.viewport }}
          path: |
            qa-artifacts-pro/screenshots
            qa-artifacts-pro/report.json
            qa-artifacts-pro/quality-report.json
            qa-artifacts-pro/execution-guard-report.json
            qa-artifacts-pro/performance-analytics-report.json
            qa-artifacts-pro/portfolio-risk-report.json
            qa-artifacts-pro/semantic-typography-report.json
            qa-artifacts-pro/advanced-visual-report.json
            qa-artifacts-pro/mobile-layout-report.json
            qa-artifacts-pro/mobile-account-tools-report.json
            /tmp/atlas-pro-http.log
          retention-days: 1
          if-no-files-found: error
