name: ATLAS X Next visual QA

on:
  pull_request:
    branches: ['atlas-x-rebuild-base']
    paths:
      - 'atlas-x-next/**'
      - 'qa/visual-next/**'
      - '.github/workflows/atlas-x-next-visual.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  visual-qa:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Prepare browser and deterministic Chinese font
        run: |
          npm init -y
          npm install --no-save playwright-core@1.55.0 @fontsource-variable/noto-sans-sc
          test -x /usr/bin/google-chrome
          python3 - <<'PY'
          from pathlib import Path
          path = Path('atlas-x-next/index.html')
          text = path.read_text(encoding='utf-8')
          qa_font = '''
          <link rel="stylesheet" href="/node_modules/@fontsource-variable/noto-sans-sc/wght.css" />
          <style>
            html, body, button, input { font-family: "Noto Sans SC Variable", "PingFang SC", "Microsoft YaHei", sans-serif !important; }
          </style>
          '''
          if '@fontsource-variable/noto-sans-sc' not in text:
              text = text.replace('</head>', qa_font + '\n</head>')
              path.write_text(text, encoding='utf-8')
          PY

      - name: Start static server
        run: |
          python3 -m http.server 4173 > /tmp/atlas-next-http.log 2>&1 &
          echo $! > /tmp/atlas-next-http.pid
          sleep 2

      - name: Capture and validate
        env:
          CHROME_BIN: /usr/bin/google-chrome
        run: node qa/visual-next/capture.mjs

      - name: Upload screenshots and report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: atlas-x-next-visual
          path: |
            qa-artifacts-next/screenshots
            qa-artifacts-next/report.json
            /tmp/atlas-next-http.log
          retention-days: 1
          if-no-files-found: error
