openapi: 3.1.0
jsonSchemaDialect: https://json-schema.org/draft/2020-12/schema
info:
  title: ATLAS X Unified Contract
  version: 1.0.0
  description: Cross-platform data contract for ATLAS X Web/PWA and SwiftUI clients.
servers:
  - url: https://api.example.invalid
    description: Contract placeholder only; this milestone does not deploy or define production routing.
paths:
  /v1/markets/{symbol}/snapshot:
    get:
      operationId: getMarketSnapshot
      parameters:
        - $ref: '#/components/parameters/Symbol'
      responses:
        '200':
          description: Current market snapshot.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MarketSnapshot'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /v1/markets/{symbol}/candles:
    get:
      operationId: getCandles
      parameters:
        - $ref: '#/components/parameters/Symbol'
      responses:
        '200':
          description: Ordered candle events.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Candle'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /v1/markets/{symbol}/order-book:
    get:
      operationId: getOrderBook
      parameters:
        - $ref: '#/components/parameters/Symbol'
      responses:
        '200':
          description: Current order-book snapshot.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderBookSnapshot'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /v1/accounts/{accountId}/assets:
    get:
      operationId: getAccountAssets
      parameters:
        - name: accountId
          in: path
          required: true
          schema:
            type: string
            minLength: 1
      responses:
        '200':
          description: Account asset snapshots.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AccountAsset'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /v1/orders:
    post:
      operationId: submitOrder
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrderDraft'
      responses:
        '201':
          description: Submitted order.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Order'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /v1/orders/{orderId}:
    get:
      operationId: getOrder
      parameters:
        - name: orderId
          in: path
          required: true
          schema:
            type: string
            minLength: 1
      responses:
        '200':
          description: Submitted order.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Order'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /v1/fills:
    get:
      operationId: listFills
      responses:
        '200':
          description: Fill events.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Fill'
        default:
          $ref: '#/components/responses/ErrorResponse'
components:
  parameters:
    Symbol:
      name: symbol
      in: path
      required: true
      schema:
        $ref: '#/components/schemas/Symbol'
  responses:
    ErrorResponse:
      description: Structured error.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorObject'
  schemas:
    SchemaVersion:
      type: string
      pattern: '^\d+\.\d+\.\d+$'
      examples: ['1.0.0']
    DecimalString:
      type: string
      pattern: '^-?(?:0|[1-9]\d*)(?:\.\d*[1-9])?$'
      description: Canonical non-exponent decimal string. Financial values are never JSON numbers.
      examples: ['0', '0.1', '-12.34']
    NonNegativeDecimalString:
      type: string
      pattern: '^(?:0|[1-9]\d*)(?:\.\d*[1-9])?$'
    PositiveDecimalString:
      type: string
      pattern: '^(?:0\.\d*[1-9]|[1-9]\d*(?:\.\d*[1-9])?)$'
    Truthfulness:
      type: string
      enum: [unknown, cachedReal, real, simulated, fixture]
    DataSource:
      type: object
      additionalProperties: false
      required: [provider, truthfulness]
      properties:
        provider:
          type: string
          minLength: 1
        truthfulness:
          $ref: '#/components/schemas/Truthfulness'
        cacheTime:
          type: string
          format: date-time
    EventMetadata:
      type: object
      additionalProperties: false
      required: [schemaVersion, id, source, sequence, serverTime, receivedAt]
      properties:
        schemaVersion:
          $ref: '#/components/schemas/SchemaVersion'
        id:
          type: string
          minLength: 1
          pattern: '^[A-Za-z0-9._:-]+$'
        source:
          $ref: '#/components/schemas/DataSource'
        sequence:
          type: integer
          minimum: 0
        serverTime:
          type: string
          format: date-time
        receivedAt:
          type: string
          format: date-time
    Symbol:
      type: string
      pattern: '^[A-Z0-9]+-[A-Z0-9]+$'
    MarketSnapshot:
      type: object
      additionalProperties: false
      required: [metadata, symbol, bid, ask, last, baseVolume, quoteVolume]
      properties:
        metadata:
          $ref: '#/components/schemas/EventMetadata'
        symbol:
          $ref: '#/components/schemas/Symbol'
        bid:
          $ref: '#/components/schemas/PositiveDecimalString'
        ask:
          $ref: '#/components/schemas/PositiveDecimalString'
        last:
          $ref: '#/components/schemas/PositiveDecimalString'
        baseVolume:
          $ref: '#/components/schemas/NonNegativeDecimalString'
        quoteVolume:
          $ref: '#/components/schemas/NonNegativeDecimalString'
    CandleInterval:
      type: string
      enum: [1m, 3m, 5m, 15m, 30m, 1h, 2h, 4h, 6h, 12h, 1d, 1w]
    Candle:
      type: object
      additionalProperties: false
      required: [metadata, symbol, interval, openTime, closeTime, open, high, low, close, volume, quoteVolume, closed]
      properties:
        metadata:
          $ref: '#/components/schemas/EventMetadata'
        symbol:
          $ref: '#/components/schemas/Symbol'
        interval:
          $ref: '#/components/schemas/CandleInterval'
        openTime:
          type: string
          format: date-time
        closeTime:
          type: string
          format: date-time
        open:
          $ref: '#/components/schemas/PositiveDecimalString'
        high:
          $ref: '#/components/schemas/PositiveDecimalString'
        low:
          $ref: '#/components/schemas/PositiveDecimalString'
        close:
          $ref: '#/components/schemas/PositiveDecimalString'
        volume:
          $ref: '#/components/schemas/NonNegativeDecimalString'
        quoteVolume:
          $ref: '#/components/schemas/NonNegativeDecimalString'
        closed:
          type: boolean
    OrderBookLevel:
      type: object
      additionalProperties: false
      required: [price, quantity]
      properties:
        price:
          $ref: '#/components/schemas/PositiveDecimalString'
        quantity:
          $ref: '#/components/schemas/PositiveDecimalString'
    OrderBookSnapshot:
      type: object
      additionalProperties: false
      required: [metadata, symbol, tickSize, bids, asks]
      properties:
        metadata:
          $ref: '#/components/schemas/EventMetadata'
        symbol:
          $ref: '#/components/schemas/Symbol'
        tickSize:
          $ref: '#/components/schemas/PositiveDecimalString'
        bids:
          type: array
          items:
            $ref: '#/components/schemas/OrderBookLevel'
        asks:
          type: array
          items:
            $ref: '#/components/schemas/OrderBookLevel'
    AccountAsset:
      type: object
      additionalProperties: false
      required: [metadata, accountId, asset, available, locked, total]
      properties:
        metadata:
          $ref: '#/components/schemas/EventMetadata'
        accountId:
          type: string
          minLength: 1
        asset:
          type: string
          pattern: '^[A-Z0-9]+$'
        available:
          $ref: '#/components/schemas/NonNegativeDecimalString'
        locked:
          $ref: '#/components/schemas/NonNegativeDecimalString'
        total:
          $ref: '#/components/schemas/NonNegativeDecimalString'
    OrderSide:
      type: string
      enum: [buy, sell]
    OrderType:
      type: string
      enum: [market, limit, stopMarket, stopLimit]
    OrderDraftBase:
      type: object
      required: [schemaVersion, clientOrderId, symbol, side, type, quantity, createdAt]
      properties:
        schemaVersion:
          $ref: '#/components/schemas/SchemaVersion'
        clientOrderId:
          type: string
          minLength: 1
        symbol:
          $ref: '#/components/schemas/Symbol'
        side:
          $ref: '#/components/schemas/OrderSide'
        type:
          $ref: '#/components/schemas/OrderType'
        quantity:
          $ref: '#/components/schemas/PositiveDecimalString'
        createdAt:
          type: string
          format: date-time
    MarketOrderDraft:
      type: object
      unevaluatedProperties: false
      allOf:
        - $ref: '#/components/schemas/OrderDraftBase'
        - type: object
          required: [type]
          properties:
            type:
              const: market
    LimitOrderDraft:
      type: object
      unevaluatedProperties: false
      allOf:
        - $ref: '#/components/schemas/OrderDraftBase'
        - type: object
          required: [type, price]
          properties:
            type:
              const: limit
            price:
              $ref: '#/components/schemas/PositiveDecimalString'
    StopMarketOrderDraft:
      type: object
      unevaluatedProperties: false
      allOf:
        - $ref: '#/components/schemas/OrderDraftBase'
        - type: object
          required: [type, stopPrice]
          properties:
            type:
              const: stopMarket
            stopPrice:
              $ref: '#/components/schemas/PositiveDecimalString'
    StopLimitOrderDraft:
      type: object
      unevaluatedProperties: false
      allOf:
        - $ref: '#/components/schemas/OrderDraftBase'
        - type: object
          required: [type, price, stopPrice]
          properties:
            type:
              const: stopLimit
            price:
              $ref: '#/components/schemas/PositiveDecimalString'
            stopPrice:
              $ref: '#/components/schemas/PositiveDecimalString'
    OrderDraft:
      oneOf:
        - $ref: '#/components/schemas/MarketOrderDraft'
        - $ref: '#/components/schemas/LimitOrderDraft'
        - $ref: '#/components/schemas/StopMarketOrderDraft'
        - $ref: '#/components/schemas/StopLimitOrderDraft'
      discriminator:
        propertyName: type
    OrderStatus:
      type: string
      enum: [accepted, partiallyFilled, filled, cancelled, rejected]
    Order:
      type: object
      additionalProperties: false
      required: [metadata, orderId, draft, status, filledQuantity, remainingQuantity, feePaid, updatedAt]
      properties:
        metadata:
          $ref: '#/components/schemas/EventMetadata'
        orderId:
          type: string
          minLength: 1
        draft:
          $ref: '#/components/schemas/OrderDraft'
        status:
          $ref: '#/components/schemas/OrderStatus'
        filledQuantity:
          $ref: '#/components/schemas/NonNegativeDecimalString'
        remainingQuantity:
          $ref: '#/components/schemas/NonNegativeDecimalString'
        averageFillPrice:
          oneOf:
            - $ref: '#/components/schemas/PositiveDecimalString'
            - type: 'null'
        feePaid:
          $ref: '#/components/schemas/NonNegativeDecimalString'
        updatedAt:
          type: string
          format: date-time
    Fill:
      type: object
      additionalProperties: false
      required: [metadata, fillId, orderId, symbol, side, price, quantity, quoteAmount, fee, feeAsset]
      properties:
        metadata:
          $ref: '#/components/schemas/EventMetadata'
        fillId:
          type: string
          minLength: 1
        orderId:
          type: string
          minLength: 1
        symbol:
          $ref: '#/components/schemas/Symbol'
        side:
          $ref: '#/components/schemas/OrderSide'
        price:
          $ref: '#/components/schemas/PositiveDecimalString'
        quantity:
          $ref: '#/components/schemas/PositiveDecimalString'
        quoteAmount:
          $ref: '#/components/schemas/PositiveDecimalString'
        fee:
          $ref: '#/components/schemas/NonNegativeDecimalString'
        feeAsset:
          type: string
          pattern: '^[A-Z0-9]+$'
    ErrorObject:
      type: object
      additionalProperties: false
      required: [schemaVersion, code, message]
      properties:
        schemaVersion:
          $ref: '#/components/schemas/SchemaVersion'
        code:
          type: string
          pattern: '^[A-Z0-9_]+$'
        message:
          type: string
          minLength: 1
        details:
          type: object
          additionalProperties: true
