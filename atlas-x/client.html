<!doctype html>
<html lang="zh-CN">
<head>

<title>ATLAS X｜专业模拟交易终端</title>
<style>
:root{color-scheme:dark;font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","PingFang SC",Inter,Arial,sans-serif}*{box-sizing:border-box}html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#05070b}button{font:inherit}.terminal{position:fixed;inset:0;width:100%;height:100dvh;border:0;opacity:0;visibility:hidden;background:#fff;transition:opacity .48s ease,visibility .48s}.terminal.show{opacity:1;visibility:visible}.intro{position:fixed;inset:0;z-index:5;display:grid;place-items:center;overflow:hidden;color:#f7f9fd;background:radial-gradient(circle at 50% 45%,rgba(37,197,145,.13),transparent 24%),radial-gradient(circle at 18% 24%,rgba(79,118,255,.22),transparent 28%),radial-gradient(circle at 83% 74%,rgba(255,67,140,.14),transparent 28%),linear-gradient(145deg,#040609,#09101a 52%,#04060a);transition:opacity .55s cubic-bezier(.2,.8,.2,1),transform .55s cubic-bezier(.2,.8,.2,1),visibility .55s;isolation:isolate}.intro.leave{opacity:0;visibility:hidden;transform:scale(1.025);pointer-events:none}.grid{position:absolute;inset:-50px;z-index:-4;background-image:linear-gradient(rgba(255,255,255,.035) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.035) 1px,transparent 1px);background-size:42px 42px;mask-image:radial-gradient(circle at center,#000 20%,transparent 73%);animation:grid 20s linear infinite}.glow{position:absolute;border-radius:50%;filter:blur(1px);z-index:-3}.glow.a{width:440px;height:440px;left:-175px;top:-180px;background:conic-gradient(from 20deg,transparent,rgba(89,126,255,.2),transparent 38%,rgba(59,225,173,.08),transparent);animation:spin 19s linear infinite}.glow.b{width:340px;height:340px;right:-135px;bottom:-110px;background:conic-gradient(from 140deg,transparent,rgba(255,75,143,.16),transparent 44%,rgba(64,226,175,.1),transparent);animation:spin 15s linear infinite reverse}.particles{position:absolute;inset:0;width:100%;height:100%;z-index:-2;opacity:.8}.rail{position:absolute;left:0;right:0;top:0;height:38px;overflow:hidden;border-bottom:1px solid rgba(255,255,255,.075);background:rgba(4,7,11,.5);backdrop-filter:blur(16px)}.track{height:100%;display:flex;align-items:center;gap:34px;width:max-content;padding-left:24px;animation:rail 26s linear infinite}.track span{display:flex;gap:8px;align-items:center;white-space:nowrap;font:650 10px/1 ui-monospace,SFMono-Regular,Menlo,monospace;letter-spacing:.04em}.track b{color:rgba(255,255,255,.48)}.track em{font-style:normal;color:#fff}.track i{font-style:normal;color:#54e5b2}.track span:nth-child(3n) i{color:#ff6ca2}.card{position:relative;width:min(830px,calc(100vw - 40px));padding:54px 58px 48px;border:1px solid rgba(255,255,255,.12);border-radius:30px;background:linear-gradient(145deg,rgba(17,23,33,.82),rgba(7,10,16,.62));box-shadow:0 34px 110px rgba(0,0,0,.5),inset 0 1px 0 rgba(255,255,255,.08);backdrop-filter:blur(28px) saturate(130%);opacity:0;transform:translateY(18px);animation:reveal .9s cubic-bezier(.16,1,.3,1) .1s forwards}.card:before{content:"";position:absolute;inset:-1px;border-radius:inherit;padding:1px;background:linear-gradient(130deg,rgba(111,150,255,.58),rgba(255,255,255,.05) 35%,rgba(61,229,174,.35) 75%,rgba(255,84,147,.28));-webkit-mask:linear-gradient(#000 0 0) content-box,linear-gradient(#000 0 0);-webkit-mask-composite:xor;mask-composite:exclude;pointer-events:none}.brand{display:flex;align-items:center;gap:14px;margin-bottom:33px}.mark{position:relative;width:50px;height:50px;display:grid;place-items:center;border-radius:15px;background:linear-gradient(145deg,rgba(255,255,255,.16),rgba(255,255,255,.055));box-shadow:inset 0 0 0 1px rgba(255,255,255,.12),0 14px 34px rgba(0,0,0,.3)}.mark b{font-size:21px;font-weight:900;background:linear-gradient(135deg,#fff,#8aa8ff 55%,#5fe4b4);-webkit-background-clip:text;color:transparent}.mark i{position:absolute;inset:-7px;border-radius:18px;border:1px solid rgba(104,143,255,.27);animation:pulse 2.8s ease-in-out infinite}.mark i:last-child{inset:-13px;border-color:rgba(70,229,176,.12);animation-delay:.55s}.brand div:last-child{display:flex;flex-direction:column}.brand strong{font-size:17px;letter-spacing:.16em}.brand small{margin-top:4px;color:rgba(226,231,239,.44);font-size:8px;letter-spacing:.22em}.kicker{display:flex;align-items:center;gap:10px;color:rgba(231,236,244,.58);font-size:10px;font-weight:800;letter-spacing:.16em}.kicker i{width:7px;height:7px;border-radius:50%;background:#51e6af;box-shadow:0 0 0 5px rgba(81,230,175,.1),0 0 22px rgba(81,230,175,.72);animation:status 1.8s ease-in-out infinite}.card h1{margin:18px 0 17px;font-size:clamp(34px,5.5vw,64px);line-height:1.06;letter-spacing:-.055em;color:#fff}.card h1 span{display:inline-block;background:linear-gradient(90deg,#fff,#9eb7ff 38%,#60e4b5 69%,#ff83ae);background-size:180% 100%;-webkit-background-clip:text;color:transparent;animation:title 5s ease-in-out infinite alternate}.card p{max-width:650px;margin:0;color:rgba(231,236,244,.65);font-size:14px;line-height:1.85}.caps{display:flex;flex-wrap:wrap;gap:8px;margin-top:25px}.caps span{height:29px;display:flex;align-items:center;padding:0 11px;border:1px solid rgba(255,255,255,.1);border-radius:999px;background:rgba(255,255,255,.045);color:rgba(232,236,243,.62);font:700 8px/1 ui-monospace,SFMono-Regular,Menlo,monospace;letter-spacing:.1em}.enter{position:relative;margin-top:31px;min-width:225px;height:54px;display:flex;align-items:center;justify-content:center;gap:18px;padding:0 24px;border:0;border-radius:15px;overflow:hidden;background:#f7f9fc;color:#07090d;font-size:14px;font-weight:850;box-shadow:0 18px 44px rgba(0,0,0,.3);transition:transform .22s,box-shadow .22s;cursor:pointer}.enter:before{content:"";position:absolute;inset:0;background:linear-gradient(105deg,transparent 20%,rgba(96,228,181,.45) 49%,rgba(126,157,255,.32) 55%,transparent 80%);transform:translateX(-120%);transition:transform .65s}.enter:hover:before{transform:translateX(120%)}.enter:hover{transform:translateY(-3px);box-shadow:0 24px 54px rgba(0,0,0,.4)}.enter:active{transform:scale(.985)}.enter svg{width:18px;height:18px;fill:none;stroke:currentColor;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}.ready{position:absolute;right:58px;bottom:57px;display:grid;grid-template-columns:8px auto auto;align-items:center;gap:9px;color:rgba(225,231,240,.45);font:700 8px/1 ui-monospace,SFMono-Regular,Menlo,monospace;letter-spacing:.1em}.ready i{width:6px;height:6px;border-radius:50%;background:#f1c75b;box-shadow:0 0 14px rgba(241,199,91,.45)}.ready.ok i{background:#54e5b2;box-shadow:0 0 15px rgba(84,229,178,.65)}.ready b{min-width:34px;text-align:right;color:rgba(255,255,255,.72)}.foot{position:absolute;left:0;right:0;bottom:max(18px,env(safe-area-inset-bottom));display:flex;justify-content:center;gap:12px;color:rgba(226,231,239,.28);font:700 7px/1 ui-monospace,SFMono-Regular,Menlo,monospace;letter-spacing:.13em}.foot i{width:3px;height:3px;border-radius:50%;background:rgba(255,255,255,.22)}@keyframes grid{to{background-position:42px 42px}}@keyframes spin{to{transform:rotate(360deg)}}@keyframes rail{to{transform:translateX(-50%)}}@keyframes reveal{to{opacity:1;transform:none}}@keyframes pulse{0%,100%{opacity:.35;transform:scale(.96)}50%{opacity:1;transform:scale(1.04)}}@keyframes status{0%,100%{opacity:.55;transform:scale(.85)}50%{opacity:1;transform:scale(1.12)}}@keyframes title{to{background-position:100% 0}}@media(max-width:620px){.rail{height:34px}.track{gap:23px}.card{width:calc(100vw - 28px);padding:37px 24px 34px;border-radius:22px}.brand{margin-bottom:25px}.mark{width:44px;height:44px}.card h1{font-size:clamp(31px,9.5vw,42px);line-height:1.1;margin:15px 0}.card p{font-size:12px;line-height:1.75}.caps{gap:6px;margin-top:20px}.caps span{height:26px;padding:0 8px;font-size:7px}.enter{width:100%;min-width:0;margin-top:25px;height:52px}.ready{position:static;margin-top:17px;justify-content:flex-start}.foot{bottom:max(12px,env(safe-area-inset-bottom));gap:7px}.foot span:nth-of-type(2){display:none}.glow.a{width:300px;height:300px}.glow.b{width:240px;height:240px}}@media(prefers-reduced-motion:reduce){*{animation-duration:.01ms!important;animation-iteration-count:1!important}}
</style>
</head>
<body>
<iframe id="terminal" class="terminal" title="ATLAS X 交易终端" src="../v14/index.html"></iframe>
<section id="intro" class="intro">
<canvas id="particles" class="particles"></canvas><div class="grid"></div><div class="glow a"></div><div class="glow b"></div>
<div class="rail"><div class="track" id="track"></div></div>
<div class="card"><div class="brand"><div class="mark"><b>A</b><i></i><i></i></div><div><strong>ATLAS X</strong><small>PROFESSIONAL TRADING SYSTEM</small></div></div><div class="kicker"><i></i><span>CLIENT EXPERIENCE · RELEASE CANDIDATE</span></div><h1>专业，不止看起来像。<br><span>每一次点击都能真正发生。</span></h1><p>实时行情、专业K线、现货与永续、模拟撮合、账户账本与风险系统，统一在一套可完整操作的终端中。</p><div class="caps"><span>REAL-TIME MARKET</span><span>PRO CHART</span><span>SPOT &amp; PERP</span><span>ORDER ENGINE</span></div><button id="enter" class="enter" type="button"><span>进入交易终端</span><svg viewBox="0 0 24 24"><path d="M5 12h13M13 6l6 6-6 6"/></svg></button><div id="ready" class="ready"><i></i><span id="readyText">正在载入核心终端</span><b id="readyValue">08%</b></div></div>
<div class="foot"><span>PUBLIC MARKET DATA</span><i></i><span>LOCAL SIMULATION ENGINE</span><i></i><span>NO REAL FUNDS</span></div>
</section>
<script>
(()=>{'use strict';
const frame=document.getElementById('terminal'),intro=document.getElementById('intro'),button=document.getElementById('enter'),ready=document.getElementById('ready'),readyText=document.getElementById('readyText'),readyValue=document.getElementById('readyValue');
const quotes=['BTC 64,407.6 +2.18%','ETH 3,385.8 +1.42%','SOL 154.42 -0.36%','BNB 608.20 +0.84%','XRP 0.5152 +3.06%','DOGE 0.1248 +1.08%'];document.getElementById('track').innerHTML=[...quotes,...quotes].map((x,i)=>{const [a,b,c]=x.split(' ');return`<span><b>${a}</b><em>${b}</em><i>${c}</i></span>`}).join('');
let terminalReady=false,queued=false,progress=8,raf=0;const started=performance.now();function tick(){if(!terminalReady)progress=Math.min(94,Math.floor(8+(performance.now()-started)/28));else progress=100;readyValue.textContent=String(progress).padStart(2,'0')+'%';readyText.textContent=terminalReady?'所有核心模块已就绪':progress>64?'正在同步交易引擎':'正在载入核心终端';ready.classList.toggle('ok',terminalReady);if(!terminalReady)requestAnimationFrame(tick)}tick();
function prepareFrame(){try{const w=frame.contentWindow,d=frame.contentDocument;if(!w||!d)return false;const app=d.getElementById('app');if(!app)return false;if(w.__ATLAS_V14||w.__ATLAS_ENTER){terminalReady=true;if(queued)show();return true}}catch{}return false}
frame.addEventListener('load',()=>{let tries=0;const timer=setInterval(()=>{tries++;if(prepareFrame()||tries>160){clearInterval(timer);if(!terminalReady){terminalReady=true;readyText.textContent='终端已载入，可直接进入';ready.classList.add('ok');if(queued)show()}}},50)});
function show(){if(!terminalReady){queued=true;button.querySelector('span').textContent='正在准备终端…';return}try{const w=frame.contentWindow,d=frame.contentDocument;if(typeof w.__ATLAS_ENTER==='function')w.__ATLAS_ENTER();else{const internal=d.getElementById('enterDemo');internal?.click();const app=d.getElementById('app');if(app){app.classList.add('ready');app.setAttribute('aria-hidden','false')}const inside=d.getElementById('presentationIntro');if(inside){inside.hidden=true;inside.style.display='none'}}}catch{}frame.classList.add('show');intro.classList.add('leave');button.setAttribute('aria-busy','true');if(navigator.vibrate)navigator.vibrate(8);setTimeout(()=>{intro.hidden=true},620)}
button.addEventListener('click',show);setTimeout(()=>{if(!terminalReady){terminalReady=true;readyText.textContent='终端已载入，可直接进入';ready.classList.add('ok');if(queued)show()}},9000);
const canvas=document.getElementById('particles'),ctx=canvas.getContext('2d'),reduced=matchMedia('(prefers-reduced-motion:reduce)').matches;let W=0,H=0,D=1,pts=[];function resize(){D=Math.min(devicePixelRatio||1,2);W=innerWidth;H=innerHeight;canvas.width=W*D;canvas.height=H*D;ctx.setTransform(D,0,0,D,0,0);pts=Array.from({length:Math.max(24,Math.min(70,Math.round(W*H/18000)))},()=>({x:Math.random()*W,y:Math.random()*H,vx:(Math.random()-.5)*.16,vy:(Math.random()-.5)*.12,r:Math.random()*1.25+.35,a:Math.random()*.42+.1}))}function draw(){ctx.clearRect(0,0,W,H);for(const p of pts){p.x+=p.vx;p.y+=p.vy;if(p.x<0)p.x=W;if(p.x>W)p.x=0;if(p.y<0)p.y=H;if(p.y>H)p.y=0;ctx.beginPath();ctx.fillStyle=`rgba(173,198,255,${p.a})`;ctx.arc(p.x,p.y,p.r,0,7);ctx.fill()}for(let i=0;i<pts.length;i++)for(let j=i+1;j<pts.length;j++){const a=pts[i],b=pts[j],x=a.x-b.x,y=a.y-b.y,z=x*x+y*y;if(z<10500){ctx.beginPath();ctx.strokeStyle=`rgba(106,151,222,${(1-z/10500)*.075})`;ctx.moveTo(a.x,a.y);ctx.lineTo(b.x,b.y);ctx.stroke()}}raf=requestAnimationFrame(draw)}resize();addEventListener('resize',resize,{passive:true});if(!reduced)draw();
})();
</script>
</body>
</html>
