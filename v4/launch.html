<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta name="theme-color" content="#07090d"><title>ATLAS X V4｜专业模拟交易终端</title><link rel="stylesheet" href="./styles.css?v=4"><style>html,body{margin:0;background:#07090d}.boot{position:fixed;inset:0;display:grid;place-items:center;background:radial-gradient(circle at 50% 30%,#18233b 0,transparent 38%),#07090d;color:#7f8998;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC",sans-serif;z-index:999}.box{text-align:center}.mark{width:48px;height:48px;margin:auto;border-radius:14px;background:linear-gradient(145deg,#6e8bff,#6fe2c3);box-shadow:0 0 45px #6e8bff35;animation:p 1s infinite alternate}.box p{font-size:12px;margin:16px 0 5px}.box small{font-size:9px;color:#505a68}@keyframes p{to{transform:scale(.84);filter:brightness(1.25)}}</style></head><body><div class="boot" id="boot"><div class="box"><div class="mark"></div><p>正在启动 ATLAS X V4 专业交易终端…</p><small id="bootStep">加载交易图表组件</small></div></div><script type="module">const step=document.getElementById('bootStep');const load=src=>new Promise((ok,no)=>{const s=document.createElement('script');s.src=src;s.onload=ok;s.onerror=no;document.head.appendChild(s)});try{try{await load('https://unpkg.com/lightweight-charts@4.2.2/dist/lightweight-charts.standalone.production.js')}catch{step.textContent='切换备用图表线路';await load('https://cdn.jsdelivr.net/npm/lightweight-charts@4.2.2/dist/lightweight-charts.standalone.production.js')}step.textContent='加载交易终端界面';const text=await fetch('./index.html?v=4',{cache:'no-store'}).then(r=>{if(!r.ok)throw new Error('shell');return r.text()});const doc=new DOMParser().parseFromString(text,'text/html');doc.querySelectorAll('script').forEach(x=>x.remove());document.body.innerHTML=doc.body.innerHTML;await import('./app.js?v=4')}catch(e){console.error(e);document.body.innerHTML='<div style="min-height:100vh;display:grid;place-items:center;background:#07090d;color:#f4f6f8;font-family:-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif;text-align:center;padding:30px"><div><h2>交易终端启动失败</h2><p style="color:#7f8998;line-height:1.7">当前网络无法加载行情或图表组件。<br>请使用 Safari / Chrome 刷新重试。</p></div></div>'}</script></body></html>
