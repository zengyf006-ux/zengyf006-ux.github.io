<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta name="theme-color" content="#07090d"><title>ATLAS X V4｜专业模拟交易终端</title><link rel="stylesheet" href="./styles.css?v=4"><style>#boot{position:fixed;inset:0;display:grid;place-items:center;background:#07090d;color:#7f8998;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC",sans-serif;z-index:999}.bootbox{text-align:center}.bootmark{width:46px;height:46px;margin:auto;border-radius:14px;background:linear-gradient(145deg,#6e8bff,#6fe2c3);animation:p 1s infinite alternate}.bootbox p{font-size:12px;margin-top:16px}@keyframes p{to{transform:scale(.84);filter:brightness(1.25)}}</style><script src="https://unpkg.com/lightweight-charts@4.2.2/dist/lightweight-charts.standalone.production.js"></script></head><body><div id="boot"><div class="bootbox"><div class="bootmark"></div><p>正在启动 ATLAS X V4 专业交易终端…</p></div></div><script type="module">try{const text=await fetch('./index.html?v=4',{cache:'no-store'}).then(r=>{if(!r.ok)throw new Error('shell');return r.text()});const doc=new DOMParser().parseFromString(text,'text/html');doc.querySelectorAll('script').forEach(x=>x.remove());document.body.innerHTML=doc.body.innerHTML;await import('./app.js?v=4')}catch(e){console.error(e);document.body.innerHTML='<div style="min-height:100vh;display:grid;place-items:center;background:#07090d;color:#f4f6f8;font-family:-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif;text-align:center;padding:30px"><div><h2>终端启动失败</h2><p style="color:#7f8998">请刷新页面或使用 Safari / Chrome 打开。</p></div></div>'}</script></body></html>
