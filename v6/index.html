<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#07090d">
<title>ATLAS X V6｜专业模拟交易终端</title>
<style>
:root{color-scheme:dark}*{box-sizing:border-box}html,body{margin:0;min-height:100%;background:#07090d;color:#f3f6fa;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC",sans-serif}.boot{position:fixed;inset:0;display:grid;place-items:center;background:radial-gradient(circle at 50% 28%,#16223d 0,transparent 38%),#07090d}.box{text-align:center;width:min(86vw,380px)}.mark{width:54px;height:54px;margin:auto;border-radius:16px;background:linear-gradient(145deg,#6d8cff,#62e0c1);box-shadow:0 0 46px rgba(109,140,255,.3);animation:p 1s infinite alternate}.bar{height:4px;margin:22px 0 14px;border-radius:99px;background:#171e29;overflow:hidden}.bar i{display:block;width:34%;height:100%;border-radius:99px;background:linear-gradient(90deg,#6d8cff,#62e0c1);animation:l 1.05s infinite}.title{font-size:14px;font-weight:780;letter-spacing:.04em}.sub{margin-top:8px;color:#7e8999;font-size:11px;line-height:1.7}.error{display:none;color:#ff7587;font-size:12px;line-height:1.7;margin-top:15px}@keyframes p{to{transform:scale(.84);filter:brightness(1.2)}}@keyframes l{from{transform:translateX(-130%)}to{transform:translateX(390%)}}
</style>
</head>
<body>
<div class="boot"><div class="box"><div class="mark"></div><div class="bar"><i></i></div><div class="title">正在启动 ATLAS X V6</div><div class="sub" id="status">装载实时行情、交易引擎、专业指标与 AI Copilot…</div><div class="error" id="error"></div></div></div>
<script>
(async()=>{
 const status=document.getElementById('status'),error=document.getElementById('error');
 const files=['p01.b64','p02.b64','p03_04.b64','p05_06.b64','p07_08.b64','p09.b64','p10.b64','p11.b64','p12.b64','p13.b64','p14.b64','p15.b64'];
 try{
  let done=0;
  const parts=[];
  for(const name of files){
   const r=await fetch(`../v5/${name}?v=603`,{cache:'no-store'});
   if(!r.ok)throw new Error(`${name} HTTP ${r.status}`);
   parts.push((await r.text()).trim());
   done++;status.textContent=`正在装载核心模块 ${done} / ${files.length}…`;
  }
  const encoded=parts.join('').replace(/\s+/g,'');
  const binary=atob(encoded),bytes=new Uint8Array(binary.length);
  for(let i=0;i<binary.length;i++)bytes[i]=binary.charCodeAt(i);
  let html;
  if(window.TextDecoder)html=new TextDecoder('utf-8').decode(bytes);
  else{let esc='';for(const b of bytes)esc+=`%${b.toString(16).padStart(2,'0')}`;html=decodeURIComponent(esc)}
  if(!/^<!doctype html>/i.test(html)||!html.includes('id="page-trade"')||html.length<80000)throw new Error('核心源码校验失败');
  html=html.replaceAll('V5.1','V6').replaceAll('V5 PROFESSIONAL','V6 TERMINAL');
  html=html.replace('</head>','<link rel="stylesheet" href="./upgrade.css?v=603"></head>');
  html=html.replace('</body>','<script src="./upgrade.js?v=603"><\/script></body>');
  document.open();document.write(html);document.close();
 }catch(e){
  console.error(e);status.textContent='终端启动失败';error.style.display='block';error.textContent=`资源加载异常：${e.message}。请关闭旧页面后重新打开，或使用 Safari / Chrome。`;
 }
})();
</script>
</body>
</html>
