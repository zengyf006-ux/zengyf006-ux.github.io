<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta name="theme-color" content="#07090d"><title>ATLAS X PRO｜实时模拟交易终端</title><link rel="preconnect" href="https://www.okx.com" crossorigin><link rel="stylesheet" href="./styles.css?v=3"><link rel="stylesheet" href="./v4-pro-1.css?v=4"><link rel="stylesheet" href="./v4-pro-2.css?v=4"><link rel="stylesheet" href="./v4-pro-3.css?v=4"></head><body><div id="v4Boot" style="height:100vh;display:grid;place-items:center;background:#07090d;color:#7f8a99;font:13px -apple-system,BlinkMacSystemFont,Segoe UI,sans-serif">正在启动 ATLAS X PRO…</div><script>(async()=>{try{const files=['v4-part-1.html','v4-part-2.html','v4-part-3.html'];const html=(await Promise.all(files.map(x=>fetch('./'+x+'?v=4',{cache:'no-store'}).then(r=>{if(!r.ok)throw new Error(x);return r.text()})))).join('');document.body.innerHTML=html;const load=src=>new Promise((ok,fail)=>{const s=document.createElement('script');s.src=src;s.onload=ok;s.onerror=fail;document.body.appendChild(s)});try{await load('https://unpkg.com/lightweight-charts@4.2.2/dist/lightweight-charts.standalone.production.js')}catch{}await load('./app.js?v=3');await load('./v4-pro.js?v=4')}catch(e){document.body.innerHTML='<div style="height:100vh;display:grid;place-items:center;background:#07090d;color:#f5f7fb;font-family:-apple-system"><div><h2>加载失败</h2><p style="color:#7f8a99">请刷新页面重试。</p></div></div>';console.error(e)}})();</script></body></html>
