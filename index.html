<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#07090d">
<title>ATLAS X｜高级模拟交易终端</title>
<style>
html,body{margin:0;height:100%;background:#07090d;color:#f5f7fa;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif}.wrap{height:100%;display:grid;place-items:center;background:radial-gradient(circle at 50% 30%,#17213a 0,transparent 40%)}.box{text-align:center}.logo{width:50px;height:50px;margin:auto;border-radius:15px;background:linear-gradient(145deg,#6f8cff,#86f7c5);box-shadow:0 0 45px #6f8cff3d;animation:p 1.1s infinite alternate}.line{width:190px;height:3px;background:#151c26;border-radius:99px;margin:20px auto 0;overflow:hidden}.line i{display:block;height:100%;width:42%;background:linear-gradient(90deg,#6f8cff,#86f7c5);animation:l 1.05s infinite}.box p{font-size:12px;color:#7f8998;letter-spacing:.04em;margin-top:14px}.err h2{font-size:20px}.err p{max-width:290px;line-height:1.7}@keyframes p{to{transform:scale(.84);filter:brightness(1.25)}}@keyframes l{from{transform:translateX(-110%)}to{transform:translateX(340%)}}
</style>
</head>
<body>
<div class="wrap"><div class="box"><div class="logo"></div><div class="line"><i></i></div><p>正在启动 ATLAS X 高级交易终端…</p></div></div>
<script>
(async()=>{
 try{
   const files=['payload/0.txt','payload/1.txt','payload/2.txt'];
   const parts=await Promise.all(files.map(x=>fetch(x+'?v=4',{cache:'no-store'}).then(r=>{if(!r.ok)throw new Error(x+' '+r.status);return r.text()})));
   const b64=parts.join('').replace(/\s/g,'');
   const bytes=Uint8Array.from(atob(b64),c=>c.charCodeAt(0));
   const html=new TextDecoder().decode(bytes);
   document.open();document.write(html);document.close();
 }catch(e){
   document.querySelector('.box').classList.add('err');
   document.querySelector('.box').innerHTML='<h2>加载失败</h2><p>请刷新页面，或使用最新版 Safari、Chrome、Edge 浏览器打开。</p>';
   console.error(e);
 }
})();
</script>
</body>
</html>
